title: "Thumbliner"
description: "The Website"

# You prefer the apex (no www)
url: "https://thumbliner.com"
baseurl: "thumbliner"   # keep empty since you'll serve from the root
footer_content: "© 2025 Thumbliner · The Curious Outsider"  # empty hides the footer line


# Use the remote theme so you don't manage theme files
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Just the Docs settings
just_the_docs:
  search_enabled: true
  color_scheme: "auto"   # auto = follows user’s light/dark preference
  nav_external_links: []
